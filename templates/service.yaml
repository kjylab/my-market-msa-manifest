apiversion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  ports: 
    - name: http
      port: 80
      targetport: {{ .Values.appConfig.server.port | default 8080 }}
      protocol: TCP

    {{- if .Values.appConfig.grpc.server }}
    - name: grpc
      port: 9090
      targetport: {{ .Values.appConfig.grpc.server.port | default 9090 }}
      protocol: TCP
    {{- end }}
  selector:
    app: {{ .Release.Name }}

